services:
  # Base de données MongoDB
  mongodb:
    image: mongo:6
    container_name: seeg-mongodb
    profiles: ["localdb"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: seeg_db
    volumes:
      - mongodb_data:/data/db
    ports:
      - "${MONGODB_PORT_HOST:-27018}:27017"
    networks:
      - seeg-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis pour le cache et rate limiting
  redis:
    image: redis:7-alpine
    container_name: seeg-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - seeg-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jaeger pour le tracing distribué
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: seeg-jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"  # UI Jaeger
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    networks:
      - seeg-network

  # Prometheus pour les métriques
  prometheus:
    image: prom/prometheus:latest
    container_name: seeg-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - seeg-network
    depends_on:
      - seeg-api

  # Grafana pour la visualisation
  grafana:
    image: grafana/grafana:latest
    container_name: seeg-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - seeg-network
    depends_on:
      - prometheus

  # Application SEEG-API
  seeg-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seeg-api
    environment:
      # Database
      MONGODB_URL: ${MONGODB_URL}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-seeg_db}
      
      # Redis
      REDIS_URL: redis://redis:6379/0
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      JWT_ISSUER: seeg-hcm-api
      JWT_AUDIENCE: seeg-hcm-frontend
      
      # Monitoring
      LOG_LEVEL: INFO
      ENABLE_TRACING: "true"
      JAEGER_ENDPOINT: jaeger:6831
      OTLP_ENDPOINT: http://jaeger:4317
      METRICS_ENABLED: "true"
      
      # Application
      ENVIRONMENT: production
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080
      
      # Email (optional)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@seeg.ga}
      
      # Application Insights (removed)
    
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - seeg-network
    depends_on:
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx (optionnel) pour le reverse proxy
  nginx:
    image: nginx:alpine
    container_name: seeg-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - seeg-network
    depends_on:
      - seeg-api

networks:
  seeg-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  prometheus_data:
  grafana_data: